function renderWorkoutList(){
  const box=document.getElementById('wkList');
  if(!box)return;
  if(!state.workouts.length){
    box.innerHTML=`<div class="wk-empty">아직 기록이 없어요. 첫 운동을 남겨보세요 🏋️</div>`;
    return;
  }
  box.innerHTML=state.workouts.map(w=>{
    const an=(w.type==='무산소');
    const detail=an
      ?[w.weight!=null?`${w.weight}kg`:null,w.reps!=null?`${w.reps}회`:null,w.sets!=null?`${w.sets}세트`:null].filter(Boolean).join(' · ')
      :[w.distance!=null?`${w.distance}km`:null,w.duration!=null?`${w.duration}분`:null].filter(Boolean).join(' · ');
    const d=(w.workout_date||'').slice(5).replace('-','/');
    return `<div class="wk-item">
      <span class="wk-tag ${an?'an':'ae'}">${an?'무산소':'유산소'}</span>
      <div class="wk-info">
        <div class="wk-ex">${esc(w.exercise||'운동')}</div>
        <div class="wk-detail">${d} · ${detail||'-'}${w.memo?' · '+esc(w.memo):''}</div>
      </div>
      <button class="wk-del" data-del="${w.id}">&times;</button>
    </div>`;
  }).join('');
  box.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick=()=>delWorkout(b.dataset.del);
  });
}
/* AI가 감지한 운동을 저장 (확인 버튼에서 호출) */
async function saveDetectedWorkout(log){
  if(!state.user||!log)return false;
  const row={
    user_id:state.user.id,
    workout_date:todayStr(),
    type:log.type,
    exercise:log.exercise||'운동',
    weight:log.weight??null, reps:log.reps??null, sets:log.sets??null,
    distance:log.distance??null, duration:log.duration??null,
    memo:'🎙️ 비서로 기록'
  };
  try{
    const {data,error}=await db.from('workouts').insert(row).select();
    if(error)throw error;
    if(data&&data[0])state.workouts.unshift(data[0]);
    toast('운동 기록에 저장했어요');
    return true;
  }catch(e){console.error(e);toast('저장에 실패했어요');return false;}
}

async function addWorkout(){
  if(!state.user)return;
  const btn=document.getElementById('wkAdd');
  const ex=document.getElementById('wkEx').value.trim();
  if(!ex){toast('운동 종목을 입력해주세요');return;}
  const num=id=>{const el=document.getElementById(id);if(!el)return null;
    const n=parseFloat(el.value);return isNaN(n)?null:n;};
  const isAn=(state.wkType==='무산소');
  const row={
    user_id:state.user.id,
    workout_date:document.getElementById('wkDate').value||todayStr(),
    type:state.wkType,
    exercise:ex,
    weight:isAn?num('wkWeight'):null,
    reps:isAn?num('wkReps'):null,
    sets:isAn?num('wkSets'):null,
    distance:isAn?null:num('wkDist'),
    duration:isAn?null:num('wkDur'),
    memo:document.getElementById('wkMemo').value.trim()||null
  };
  btn.disabled=true;btn.textContent='추가 중...';
  try{
    const {data,error}=await db.from('workouts').insert(row).select();
    if(error)throw error;
    if(data&&data[0])state.workouts.unshift(data[0]);
    toast('기록을 추가했어요');
    renderAssistant();
  }catch(e){
    console.error(e);
    btn.disabled=false;btn.textContent='기록 추가';
    toast('추가에 실패했어요. 다시 시도해주세요');
  }
}
async function delWorkout(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  try{
    const {error}=await db.from('workouts').delete().eq('id',id);
    if(error)throw error;
    state.workouts=state.workouts.filter(w=>String(w.id)!==String(id));
    renderWorkoutList();
    toast('기록을 삭제했어요');
  }catch(e){console.error(e);toast('삭제에 실패했어요');}
}

/* ---------- 스와이프 제스처 (탭 전환 + 뒤로가기) ---------- */
const TAB_ORDER=['assistant','community','status'];
function currentTab(){
  for(const t of TAB_ORDER){
    if(document.getElementById('tab-'+t).classList.contains('on'))return t;
  }
  return 'assistant';
}
function swipeTab(dir){
  /* 커뮤니티 글 상세를 보고 있으면 탭 전환 대신 목록으로 */
  if(state.view==='detail')return;
  const cur=currentTab();
  const idx=TAB_ORDER.indexOf(cur);
  const next=idx+dir;
  if(next<0||next>=TAB_ORDER.length)return; /* 양 끝에서는 무시 */
  switchTab(TAB_ORDER[next]);
}
(function(){
  let sx=0,sy=0,tracking=false,fromEdge=false;
  document.addEventListener('touchstart',e=>{
    if(e.touches.length!==1){tracking=false;return;}
    /* 입력창·버튼 등에서 시작하면 스와이프 추적 안 함 (화면 튐 방지) */
    const tag=(e.target&&e.target.tagName)||'';
    if(/INPUT|TEXTAREA|SELECT|BUTTON/.test(tag)){tracking=false;return;}
    const t=e.touches[0];
    sx=t.clientX;sy=t.clientY;tracking=true;
    fromEdge=(sx<=30); /* 왼쪽 가장자리에서 시작했나 */
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!tracking)return;tracking=false;
    /* 입력창·텍스트영역에서 시작한 제스처는 무시 */
    const tag=(e.target&&e.target.tagName)||'';
    if(/INPUT|TEXTAREA|SELECT/.test(tag))return;
    const t=e.changedTouches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy;
    /* 가로 이동이 세로보다 충분히 커야 가로 스와이프로 인정 */
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.4)return;
    if(dx>0){
      /* 오른쪽으로 쓸기 */
      if(fromEdge&&state.view==='detail'){ closeDetail(); return; } /* 가장자리+상세 = 뒤로 */
      swipeTab(-1); /* 이전 탭 */
    }else{
      swipeTab(1);  /* 다음 탭 */
    }
  },{passive:true});
})();

/* ---------- 인앱 브라우저(카톡 등) 감지 & 안내 ---------- */
(function(){
  const ua=navigator.userAgent||'';
  const inApp=/KAKAOTALK|Instagram|FBAN|FBAV|Line\/|NAVER|DaumApps|; wv\)|Snapchat|Twitter|everytimeApp|Band/i.test(ua);
  if(!inApp)return;
  const isAndroid=/Android/i.test(ua);
  const url=location.href;
  const showBanner=()=>{
    const b=document.getElementById('inappBanner');
    if(b)b.style.display='flex';
  };
  /* 안드로이드: 크롬으로 자동 전환 시도 (intent) */
  if(isAndroid){
    try{
      const clean=url.replace(/^https?:\/\//,'');
      location.href='intent://'+clean+'#Intent;scheme=https;package=com.android.chrome;end';
    }catch(e){}
    /* 자동 전환이 안 되면 배너 노출 */
    setTimeout(showBanner,1200);
  }else{
    /* 아이폰 등: 자동 전환 어려움 → 바로 안내 */
    showBanner();
  }
  /* 배너 버튼들 연결 (DOM 준비 여부 상관없이) */
  const wireBanner=()=>{
    const openBtn=document.getElementById('iabOpen');
    const copyBtn=document.getElementById('iabCopy');
    const closeBtn=document.getElementById('iabClose');
    const steps=document.getElementById('iabSteps');
    const desc=document.getElementById('iabDesc');
    if(isAndroid){
      /* 안드로이드: 크롬 열기 버튼 사용 */
      if(openBtn)openBtn.onclick=()=>{
        const clean=url.replace(/^https?:\/\//,'');
        location.href='intent://'+clean+'#Intent;scheme=https;package=com.android.chrome;end';
      };
    }else{
      /* 아이폰: 자동 열기 불가 → 단계 안내 표시, '크롬으로 열기' 버튼 숨김 */
      if(steps)steps.style.display='block';
      if(openBtn)openBtn.style.display='none';
      if(desc)desc.textContent='카카오톡에서는 로그인이 제한돼요. Safari로 열어주세요.';
      if(copyBtn)copyBtn.textContent='또는, 주소 복사하기';
    }
    if(copyBtn)copyBtn.onclick=async()=>{
      try{await navigator.clipboard.writeText(url);copyBtn.textContent='✓ 복사됨 — 브라우저 주소창에 붙여넣기';}
      catch(e){
        const t=document.createElement('input');t.value=url;document.body.appendChild(t);
        t.select();try{document.execCommand('copy');copyBtn.textContent='✓ 복사됨';}catch(_){}
        document.body.removeChild(t);
      }
    };
    if(closeBtn)closeBtn.onclick=()=>{
      document.getElementById('inappBanner').style.display='none';
    };
  };
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wireBanner);
  else wireBanner();
})();
