<!DOCTYPE html>
<html lang="ko">
<head>
<!-- OUSTALETI — 라이더 라운지 (Supabase 연결 / 실서비스 버전) -->
<meta charset="utf-8">
<title>오스탈레띠 라이더 라운지</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="오스탈레띠 라이더 라운지 — 운동하는 모든 사람의 토론 커뮤니티">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#E9E9E6;--paper:#FFFFFF;--card:#FFFFFF;--ink:#0A0A0A;
    --muted:#8B8B89;--line:#E2E2DE;--accent:#0A0A0A;--grayav:#6F6F6D;
    --blue:#22b2e0;
    --shadow:0 1px 0 rgba(10,10,10,.05), 0 14px 28px -20px rgba(10,10,10,.45);
  }
  /* 인앱 브라우저 안내 배너 */
  #inappBanner{position:fixed;inset:0;z-index:9999;background:rgba(10,10,10,.72);
    display:flex;align-items:center;justify-content:center;padding:24px;}
  #inappBanner .iab-inner{background:#fff;border-radius:20px;padding:30px 24px;
    max-width:360px;width:100%;text-align:center;box-shadow:0 20px 50px -10px rgba(0,0,0,.5);}
  .iab-emoji{font-size:42px;margin-bottom:14px;}
  .iab-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;
    color:#0A0A0A;margin-bottom:12px;}
  .iab-desc{font-size:13.5px;line-height:1.7;color:#666;margin-bottom:22px;}
  .iab-steps{background:#F6F6F4;border-radius:14px;padding:16px;margin-bottom:18px;}
  .iab-step-simple{font-size:15px;font-weight:700;color:#0A0A0A;text-align:center;line-height:1.5;}
  .iab-step-simple b{color:#22b2e0;}
  .iab-btn{width:100%;background:#22b2e0;color:#fff;border:none;border-radius:12px;
    padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:9px;}
  .iab-copy{width:100%;background:#F0F4F6;color:#22b2e0;border:none;border-radius:12px;
    padding:14px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:9px;}
  .iab-close{width:100%;background:none;color:#999;border:none;padding:8px;
    font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.55;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  textarea{font-family:inherit;}
  ::selection{background:var(--ink);color:#fff;}

  .shell{max-width:680px;margin:0 auto;min-height:100vh;background:var(--paper);
    border-left:1px solid var(--line);border-right:1px solid var(--line);position:relative;
    box-shadow:0 0 60px -20px rgba(10,10,10,.18);}

  header{position:sticky;top:0;z-index:40;background:var(--paper);}
  .topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;
    padding:12px 14px;background:var(--ink);color:#fff;}
  .hdr-left{display:flex;align-items:center;justify-self:start;}
  .hdr-center{display:flex;flex-direction:column;align-items:center;justify-self:center;
    flex:1;overflow:hidden;padding:0 8px;}
  .hdr-right{display:flex;align-items:center;justify-self:end;}
  .cog{width:24px;height:24px;animation:spin 16s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .logo-img{height:34px;width:auto;max-width:100%;display:block;}
  .hdr-tag{display:none;}
  .acct-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #fff;
    display:grid;place-items:center;color:#fff;transition:.15s;overflow:hidden;}
  .acct-btn:hover{background:#fff;color:var(--ink);}
  .acct-btn .av{display:grid;place-items:center;font-size:14px;font-weight:800;line-height:1;}
  .acct-btn .av svg{width:20px;height:20px;}

  .tabs{display:flex;gap:6px;padding:11px 14px;overflow-x:auto;
    scrollbar-width:none;border-bottom:2px dashed var(--line);}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{white-space:nowrap;font-size:13px;font-weight:700;color:var(--muted);
    padding:7px 14px;border-radius:999px;border:1.5px solid var(--line);transition:.14s;}
  .tab:hover{color:var(--ink);border-color:var(--ink);}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}

  .strip{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px;}
  .sort{display:flex;gap:14px;}
  .sort button{font-size:12.5px;font-weight:700;color:var(--muted);
    padding-bottom:3px;border-bottom:2px solid transparent;}
  .sort button.on{color:var(--ink);border-color:var(--ink);}
  .count{font-size:11.5px;color:var(--muted);font-weight:600;}

  .compose-prompt{margin:8px 16px 6px;display:flex;align-items:center;gap:11px;
    background:var(--card);border:1.5px solid var(--line);border-radius:14px;
    padding:13px 15px;transition:.15s;}
  .compose-prompt:hover{border-color:var(--ink);}
  .compose-prompt .av{width:34px;height:34px;border-radius:50%;flex:none;
    background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;}
  .compose-prompt span{color:var(--muted);font-size:14px;font-weight:500;}
  .compose-prompt .go{margin-left:auto;background:var(--ink);color:#fff;
    font-weight:800;font-size:12px;padding:8px 14px;border-radius:999px;}

  .feed{padding:8px 16px 120px;}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    padding:16px 17px 13px;margin-bottom:11px;box-shadow:var(--shadow);
    cursor:pointer;transition:transform .14s, border-color .14s;
    animation:rise .4s cubic-bezier(.2,.7,.2,1) backwards;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}}
  .card:hover{transform:translateY(-2px);border-color:var(--ink);}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .cat-chip{font-size:10.5px;font-weight:800;letter-spacing:.04em;
    padding:3px 9px;border-radius:999px;border:1.4px solid var(--ink);text-transform:uppercase;}
  .time{font-size:11.5px;color:var(--muted);font-weight:600;}
  .author{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:6px;}
  .author .av-s{width:20px;height:20px;border-radius:50%;background:var(--ink);
    color:#fff;display:grid;place-items:center;font-size:10px;font-weight:800;}
  .author .op{font-size:9.5px;font-weight:800;color:var(--ink);
    border:1.2px solid var(--ink);border-radius:4px;padding:1px 4px;}
  .body-txt{font-size:14.5px;margin:7px 0 12px;white-space:pre-wrap;word-break:break-word;}
  /* 사진 격자 */
  .img-grid{display:grid;gap:5px;margin:2px 0 12px;border-radius:12px;overflow:hidden;}
  .img-grid.n1{grid-template-columns:1fr;}
  .img-grid.n2{grid-template-columns:1fr 1fr;}
  .img-grid.n3{grid-template-columns:1fr 1fr;}
  .img-grid.n3 .gi:first-child{grid-row:span 2;}
  .img-grid.n4{grid-template-columns:1fr 1fr;}
  .img-grid .gi{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;
    background:var(--bg);cursor:zoom-in;}
  .img-grid.n1 .gi{aspect-ratio:4/3;}
  .img-grid .gi img{width:100%;height:100%;object-fit:cover;display:block;}
  /* 첨부 미리보기 (작성 중) */
  .img-preview{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 2px;}
  .img-preview .pv{position:relative;width:62px;height:62px;border-radius:9px;
    overflow:hidden;border:1.5px solid var(--line);}
  .img-preview .pv img{width:100%;height:100%;object-fit:cover;}
  .img-preview .pv .rm{position:absolute;top:2px;right:2px;width:18px;height:18px;
    border-radius:50%;background:rgba(10,10,10,.75);color:#fff;font-size:11px;
    display:grid;place-items:center;cursor:pointer;line-height:1;}
  .photo-btn{flex:none;display:grid;place-items:center;width:42px;height:42px;
    border:1.5px solid var(--line);border-radius:12px;color:var(--muted);
    cursor:pointer;transition:.13s;}
  .photo-btn:hover{border-color:var(--ink);color:var(--ink);}
  .photo-btn svg{width:21px;height:21px;}
  .modal .photo-row{display:flex;align-items:center;gap:9px;margin-top:11px;}
  .modal .photo-hint{font-size:11.5px;color:var(--muted);}
  /* 라이트박스 */
  .lightbox{position:fixed;inset:0;z-index:90;background:rgba(10,10,10,.92);
    display:none;align-items:center;justify-content:center;}
  .lightbox.show{display:flex;animation:fade .2s;}
  .lightbox img{max-width:94vw;max-height:88vh;object-fit:contain;border-radius:6px;}
  .lightbox .lx-close{position:absolute;top:18px;right:20px;color:#fff;
    font-size:30px;cursor:pointer;line-height:1;}
  .lightbox .lx-nav{position:absolute;top:50%;transform:translateY(-50%);
    color:#fff;font-size:40px;cursor:pointer;padding:10px 16px;user-select:none;
    opacity:.8;}
  .lightbox .lx-prev{left:6px;} .lightbox .lx-next{right:6px;}
  .upload-note{font-size:11.5px;color:var(--muted);margin-top:6px;}

  /* ===== 하단 탭 네비게이션 (커뮤니티/비서/내 상태) ===== */
  .shell{padding-bottom:72px;} /* 하단 탭바 공간 */
  .page{display:none;}
  .page.on{display:block;animation:pageIn .2s ease;}
  @keyframes pageIn{from{opacity:.35}to{opacity:1}}
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:680px;z-index:50;background:var(--paper);
    border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);
    box-shadow:0 -6px 20px -12px rgba(10,10,10,.25);
    padding-bottom:env(safe-area-inset-bottom);}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:9px 0 8px;color:var(--muted);font-size:11px;font-weight:700;
    transition:.13s;border:none;background:none;cursor:pointer;}
  .nav-item svg{width:23px;height:23px;}
  .nav-item.on{color:var(--ink);}
  .nav-item.on .ni-icon{color:var(--blue);}
  /* 비서 탭 자리표시 / 내 상태 자리표시 */
  .placeholder-page{padding:60px 28px;text-align:center;color:var(--muted);}
  .placeholder-page .pp-emoji{font-size:46px;margin-bottom:14px;}
  .placeholder-page .pp-title{font-family:'Bricolage Grotesque';font-weight:800;
    font-size:21px;color:var(--ink);margin-bottom:8px;}
  .placeholder-page .pp-desc{font-size:14px;line-height:1.6;max-width:340px;
    margin:0 auto 6px;}
  .placeholder-page .pp-soon{display:inline-block;margin-top:16px;font-size:11px;
    font-weight:800;letter-spacing:.05em;color:var(--blue);
    border:1.4px solid var(--blue);border-radius:999px;padding:5px 13px;}

  /* ===== 내 상태 — 프로필 입력 ===== */
  .status-wrap{padding:22px 18px 30px;}
  .st-head{margin-bottom:20px;}
  .st-head h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;
    letter-spacing:-.02em;}
  .st-head p{font-size:13.5px;color:var(--muted);margin-top:4px;}
  .pf-card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 18px;box-shadow:var(--shadow);}
  .pf-sec-title{font-size:12px;font-weight:800;color:var(--blue);
    letter-spacing:.04em;margin:4px 0 14px;}
  .pf-hint-line{font-size:12px;color:var(--muted);line-height:1.55;margin:-8px 0 14px;}
  .pf-row{display:flex;gap:12px;margin-bottom:14px;}
  .pf-field{flex:1;display:flex;flex-direction:column;gap:6px;}
  .pf-field label{font-size:12.5px;font-weight:700;color:var(--muted);}
  .pf-field input,.pf-field select,.pf-field textarea{
    width:100%;border:1.5px solid var(--line);border-radius:10px;
    padding:11px 12px;font-size:14.5px;font-family:inherit;color:var(--ink);
    background:#fff;transition:.12s;}
  .pf-field input:focus,.pf-field select:focus,.pf-field textarea:focus{
    outline:none;border-color:var(--blue);}
  .pf-field textarea{resize:none;line-height:1.5;}
  .pf-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .pf-chip{border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;
    font-size:13.5px;font-weight:700;color:var(--muted);background:#fff;
    cursor:pointer;transition:.12s;}
  .pf-chip.on{border-color:var(--blue);background:var(--blue);color:#fff;}
  .pf-save{width:100%;margin-top:6px;background:var(--ink);color:#fff;
    border-radius:12px;padding:15px;font-size:15px;font-weight:800;
    transition:.13s;}
  .pf-save:hover{background:var(--blue);}
  .pf-save:disabled{opacity:.5;cursor:default;}
  .pf-saved-note{text-align:center;font-size:12.5px;color:var(--muted);margin-top:12px;}
  .pf-locked{text-align:center;padding:50px 28px;color:var(--muted);}
  /* 비서 탭의 로그인 안내는 화면 세로 중앙으로 */
  #voiceWrap .pf-locked{min-height:calc(100vh - 230px);display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px 28px;}
  .pf-locked .lk-emoji{font-size:42px;margin-bottom:14px;}
  .pf-locked .lk-title{font-family:'Bricolage Grotesque';font-weight:800;
    font-size:20px;color:var(--ink);margin-bottom:8px;}
  .pf-locked .lk-desc{font-size:13.5px;line-height:1.6;max-width:300px;margin:0 auto 18px;}
  .pf-locked .lk-btn{display:inline-flex;align-items:center;gap:8px;
    background:var(--ink);color:#fff;border-radius:999px;padding:12px 22px;
    font-size:14px;font-weight:700;}

  /* ===== 비서 탭 — 운동 기록 ===== */
  .wk-wrap{padding:22px 18px 30px;}
  .wk-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .wk-toggle button{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--line);
    background:#fff;font-size:14.5px;font-weight:800;color:var(--muted);transition:.13s;}
  .wk-toggle button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .wk-date{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;
    color:var(--muted);font-weight:700;}
  .wk-date input{border:1.5px solid var(--line);border-radius:9px;padding:8px 10px;
    font-family:inherit;font-size:13.5px;color:var(--ink);}
  .wk-add{width:100%;background:var(--blue);color:#fff;border-radius:12px;
    padding:15px;font-size:15px;font-weight:800;transition:.13s;margin-top:4px;}
  .wk-add:hover{filter:brightness(.94);}
  .wk-add:disabled{opacity:.5;}
  .wk-list-head{font-size:12px;font-weight:800;color:var(--blue);
    letter-spacing:.04em;margin:26px 0 12px;}
  .wk-item{display:flex;align-items:center;gap:10px;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px;}
  .wk-item .wk-tag{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:6px;
    flex:none;}
  .wk-tag.an{background:#0A0A0A;color:#fff;}      /* 무산소 */
  .wk-tag.ae{background:var(--blue);color:#fff;}  /* 유산소 */
  .wk-item .wk-info{flex:1;min-width:0;}
  .wk-item .wk-ex{font-size:14.5px;font-weight:800;margin-bottom:2px;}
  .wk-item .wk-detail{font-size:12.5px;color:var(--muted);}
  .wk-item .wk-del{flex:none;color:var(--muted);font-size:18px;
    width:30px;height:30px;border-radius:8px;transition:.12s;}
  .wk-item .wk-del:hover{background:#FCE9E6;color:#C0392B;}
  .wk-empty{text-align:center;color:var(--muted);font-size:13.5px;padding:24px 0;}

  /* ===== 요약 카드 (운동 기록 상단) ===== */
  .sum-grid{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
  .sum-card{flex:1 1 calc(50% - 5px);min-width:0;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:14px 12px;
    text-align:center;box-shadow:var(--shadow);}
  .sum-card .sc-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sum-card .sc-main{font-family:'Bricolage Grotesque';font-weight:800;
    font-size:22px;letter-spacing:-.02em;line-height:1;color:var(--ink);}
  .sum-card .sc-sub{font-size:11px;font-weight:700;margin-top:6px;color:var(--muted);}
  .sc-sub.up{color:var(--blue);}
  .sc-sub.down{color:#C0392B;}
  .sum-card.race .sc-main{color:var(--blue);}

  /* 대회 일정 입력/목록 */
  .race-add-row{display:flex;gap:6px;margin-top:8px;}
  .race-add-row #raceName{flex:1.3;border:1.5px solid var(--line);border-radius:9px;
    padding:9px 10px;font-family:inherit;font-size:13.5px;}
  .race-add-row #raceDate{flex:1;border:1.5px solid var(--line);border-radius:9px;
    padding:9px 8px;font-family:inherit;font-size:13px;color:var(--ink);}
  .race-add-row #raceName:focus,.race-add-row #raceDate:focus{outline:none;border-color:var(--blue);}
  .race-add-btn{flex:none;background:var(--ink);color:#fff;border-radius:9px;
    padding:0 14px;font-size:13.5px;font-weight:800;}
  .race-add-btn:hover{background:var(--blue);}
  .race-empty{font-size:12.5px;color:var(--muted);padding:4px 2px 8px;}
  .race-item{display:flex;align-items:center;gap:10px;background:#F6F6F4;
    border-radius:10px;padding:10px 12px;margin-bottom:7px;}
  .race-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .race-nm{font-size:13.5px;font-weight:800;}
  .race-dt{font-size:11.5px;color:var(--muted);font-weight:700;}
  .race-del{flex:none;color:var(--muted);font-size:17px;width:26px;height:26px;
    border-radius:7px;transition:.12s;}
  .race-del:hover{background:#FCE9E6;color:#C0392B;}

  /* ===== 체중 추적 카드 ===== */
  .wt-card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 18px;box-shadow:var(--shadow);margin-top:14px;}
  .wt-input-row{display:flex;gap:6px;margin-bottom:16px;}
  .wt-input-row #wtDate{flex:1.1;border:1.5px solid var(--line);border-radius:9px;
    padding:10px 8px;font-family:inherit;font-size:13px;color:var(--ink);}
  .wt-input-row #wtWeight{flex:1.4;border:1.5px solid var(--line);border-radius:9px;
    padding:10px 12px;font-family:inherit;font-size:14px;}
  .wt-input-row input:focus{outline:none;border-color:var(--blue);}
  .wt-add-btn{flex:none;background:var(--blue);color:#fff;border-radius:9px;
    padding:0 16px;font-size:14px;font-weight:800;}
  .wt-hint{font-size:12.5px;color:var(--muted);line-height:1.6;
    background:#F6F6F4;border-radius:10px;padding:13px 14px;}
  .wt-goal-row{display:flex;justify-content:space-between;font-size:12.5px;
    color:var(--muted);font-weight:700;margin-bottom:9px;}
  .wt-goal-row b{color:var(--ink);font-size:14px;}
  .wt-bar{height:12px;background:#EDEDEA;border-radius:999px;overflow:hidden;}
  .wt-bar-fill{height:100%;background:var(--blue);border-radius:999px;transition:width .4s;}
  .wt-goal-foot{display:flex;justify-content:space-between;font-size:12.5px;
    font-weight:700;color:var(--muted);margin-top:9px;}
  .wt-pct{color:var(--blue);}
  .wt-predict{margin-top:12px;font-size:12.5px;font-weight:700;color:var(--ink);
    background:#EAF7FC;border-radius:10px;padding:10px 13px;}
  .wt-recent-head{font-size:11.5px;font-weight:800;color:var(--muted);
    margin:18px 0 9px;letter-spacing:.03em;}
  .wt-recent{display:flex;flex-direction:column;gap:5px;}
  .wt-rec-item{display:flex;justify-content:space-between;align-items:center;
    font-size:13px;padding:7px 11px;background:#F6F6F4;border-radius:8px;}
  .wt-rec-date{color:var(--muted);font-weight:700;}
  .wt-rec-w{font-weight:800;}
  .wt-d{font-size:11px;font-weight:800;margin-left:5px;}
  .wt-d.down{color:var(--blue);}
  .wt-d.up{color:#C0392B;}

  /* ===== 인바디 ===== */
  .ib-now{display:flex;gap:10px;margin-top:4px;}
  .ib-stat{flex:1;background:#F6F6F4;border-radius:12px;padding:14px 12px;text-align:center;}
  .ib-lab{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .ib-val{font-size:18px;font-weight:800;color:var(--ink);}
  .ib-d{font-size:11.5px;font-weight:800;margin-left:3px;}
  .ib-d.good{color:var(--blue);}
  .ib-d.bad{color:#C0392B;}
  .ib-del{color:var(--muted);font-size:15px;margin-left:6px;width:20px;height:20px;border-radius:6px;}
  .ib-del:hover{background:#FCE9E6;color:#C0392B;}
  .ib-photo-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
    background:#F0F4F6;color:var(--blue);border:1.5px dashed var(--blue);border-radius:12px;
    padding:13px;font-size:14px;font-weight:800;margin-bottom:12px;transition:.13s;}
  .ib-photo-btn:hover{background:#E4EFF3;}
  .ib-photo-status{font-size:12.5px;line-height:1.5;margin-bottom:12px;font-weight:700;}
  .ib-photo-status.loading{color:var(--blue);}
  .ib-photo-status.ok{color:#1a7a3a;background:#E8F6EC;padding:10px 12px;border-radius:10px;}
  .ib-photo-status.err{color:#C0392B;background:#FCE9E6;padding:10px 12px;border-radius:10px;}
  .str-list{display:flex;flex-direction:column;gap:8px;}
  .str-item{display:flex;justify-content:space-between;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;}
  .str-ex{font-size:14.5px;font-weight:800;}
  .str-val{font-size:14px;font-weight:800;color:var(--ink);}
  .str-up{font-size:12px;font-weight:800;color:var(--blue);margin-left:6px;}
  .str-down{font-size:12px;font-weight:800;color:#C0392B;margin-left:6px;}
  .str-flat{font-size:11.5px;font-weight:700;color:var(--muted);margin-left:6px;}
  .str-note{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.5;}

  /* ===== 종합 등급 카드 ===== */
  .grade-card{border-radius:18px;padding:20px 18px;margin-bottom:20px;color:#fff;
    box-shadow:0 14px 30px -18px rgba(10,10,10,.5);}
  .grade-card.gs{background:linear-gradient(135deg,#0a0a0a,#22b2e0);}
  .grade-card.ga{background:linear-gradient(135deg,#111,#2b6fb0);}
  .grade-card.gb{background:linear-gradient(135deg,#1a1a1a,#3a8a4a);}
  .grade-card.gc{background:linear-gradient(135deg,#222,#9a7b2e);}
  .grade-card.gd{background:linear-gradient(135deg,#2a2a2a,#6a4a4a);}
  .gc-top{display:flex;align-items:center;gap:16px;}
  .gc-badge{width:62px;height:62px;border-radius:50%;flex:none;
    background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.5);
    display:grid;place-items:center;font-family:'Bricolage Grotesque';
    font-weight:800;font-size:32px;}
  .gc-meta{flex:1;min-width:0;}
  .gc-title{font-size:13px;font-weight:700;opacity:.92;}
  .gc-score{font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;
    line-height:1.05;letter-spacing:-.02em;}
  .gc-score span{font-size:15px;opacity:.7;font-weight:700;}
  .gc-sub{font-size:11.5px;opacity:.85;font-weight:700;margin-top:2px;}
  /* 부문별 등급 3칸 */
  .gc-subs{display:flex;gap:8px;margin-top:16px;}
  .gc-sub-item{flex:1;background:rgba(255,255,255,.14);border-radius:13px;
    padding:13px 8px;text-align:center;}
  .gc-sub-badge{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;line-height:1;}
  .gc-sub-name{font-size:11.5px;font-weight:700;opacity:.9;margin-top:6px;}
  .gc-sub-score{font-size:10.5px;opacity:.75;font-weight:700;margin-top:2px;}
  .gc-vol-note{margin-top:14px;background:rgba(255,255,255,.13);border-radius:12px;
    padding:12px 14px;font-size:12px;line-height:1.6;opacity:.95;}
  .gc-vol-note b{font-weight:800;}
  .gc-detail{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2);
    display:flex;flex-direction:column;gap:7px;}
  .gc-row{display:flex;justify-content:space-between;font-size:12.5px;
    font-weight:700;opacity:.95;}
  .gc-row b{font-weight:800;}
  .gc-note{font-size:10.5px;opacity:.72;line-height:1.55;margin-top:14px;}
  /* 등급 미산정(잠금) 상태 */
  .grade-card.locked{background:#F6F6F4;color:var(--ink);text-align:center;
    box-shadow:var(--shadow);border:1px solid var(--line);}
  .gc-emoji{font-size:38px;margin-bottom:10px;}
  .gc-locktitle{font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;
    margin-bottom:8px;}
  .gc-lockdesc{font-size:13px;color:var(--muted);line-height:1.6;max-width:320px;margin:0 auto;}

  /* ===== 내 상태 서브탭 ===== */
  .sub-tabs{display:flex;gap:6px;padding:14px 18px 0;position:sticky;top:0;z-index:5;
    background:var(--paper);}
  .sub-tab{flex:1;padding:12px;border-radius:11px;border:1.5px solid var(--line);
    background:#fff;font-size:14px;font-weight:800;color:var(--muted);transition:.13s;}
  .sub-tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .sub-pane{display:none;}
  .sub-pane.on{display:block;}

  /* ===== AI 운동 비서 채팅 ===== */
  .ai-panel{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;margin-bottom:22px;box-shadow:var(--shadow);}
  .ai-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .ai-title{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;}
  .ai-clear{font-size:11.5px;font-weight:700;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:4px 11px;transition:.12s;}
  .ai-clear:hover{background:#FCE9E6;color:#C0392B;border-color:#FCE9E6;}
  .ai-msgs{max-height:340px;overflow-y:auto;display:flex;flex-direction:column;
    gap:9px;padding:4px 2px;}
  .ai-msg{max-width:85%;padding:11px 14px;border-radius:14px;font-size:14px;
    line-height:1.55;word-break:break-word;}
  .ai-msg.user{align-self:flex-end;background:var(--ink);color:#fff;
    border-bottom-right-radius:5px;}
  .ai-msg.assistant{align-self:flex-start;background:#F0F4F6;color:var(--ink);
    border-bottom-left-radius:5px;}
  .ai-welcome{text-align:center;padding:0 8px;color:var(--muted);}
  .ai-w-headline{font-family:'Bricolage Grotesque';font-weight:800;font-size:21px;
    color:var(--ink);line-height:1.4;margin-bottom:26px;letter-spacing:-.01em;}
  .ai-w-emoji{font-size:40px;margin-bottom:18px;}
  .ai-w-title{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;
    color:var(--ink);margin-bottom:7px;}
  .ai-w-lead{font-size:15px;font-weight:800;color:var(--blue);margin-bottom:14px;}
  .ai-w-desc{font-size:13.5px;line-height:1.75;}
  .ai-input-row{display:flex;gap:7px;margin-top:12px;align-items:flex-end;}
  .ai-input-row textarea{flex:1;border:1.5px solid var(--line);border-radius:12px;
    padding:11px 13px;font-family:inherit;font-size:14px;resize:none;line-height:1.4;
    max-height:120px;}
  .ai-input-row textarea:focus{outline:none;border-color:var(--blue);}
  .ai-send{flex:none;background:var(--blue);color:#fff;border-radius:12px;
    padding:0 18px;height:44px;font-size:14px;font-weight:800;transition:.13s;}
  .ai-send:hover{filter:brightness(.94);}
  .ai-note{font-size:10.5px;color:var(--muted);margin-top:9px;line-height:1.5;text-align:center;}
  /* 타이핑 점 애니메이션 */
  .ai-typing span{display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--muted);margin:0 1px;animation:aiblink 1.2s infinite;}
  .ai-typing span:nth-child(2){animation-delay:.2s;}
  .ai-typing span:nth-child(3){animation-delay:.4s;}
  @keyframes aiblink{0%,60%,100%{opacity:.25;}30%{opacity:1;}}

  /* ===== 음성 비서 ===== */
  .voice-screen{padding:64px 20px 40px;display:flex;flex-direction:column;align-items:center;}
  /* 대화가 있을 땐 위에서부터 */
  .voice-screen.has-chat{padding-top:20px;}
  .voice-msgs{width:100%;display:flex;flex-direction:column;gap:9px;}
  .voice-screen.has-chat .voice-msgs{flex:1;overflow-y:auto;max-height:50vh;margin-bottom:20px;}
  .voice-status{min-height:2px;}
  .mic-btn{width:92px;height:92px;border-radius:50%;background:var(--blue);color:#fff;
    display:grid;place-items:center;box-shadow:0 12px 30px -8px rgba(34,178,224,.6);
    transition:.18s;margin-top:36px;}
  .voice-screen.has-chat .mic-btn{margin-top:8px;}
  .mic-btn svg{width:40px;height:40px;}
  .mic-btn:hover{transform:scale(1.04);}
  .mic-btn.listening{background:#C0392B;box-shadow:0 0 0 0 rgba(192,57,43,.5);
    animation:micpulse 1.3s infinite;}
  .mic-btn.thinking{background:var(--ink);animation:none;opacity:.7;}
  @keyframes micpulse{
    0%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}
    70%{box-shadow:0 0 0 22px rgba(192,57,43,0);}
    100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
  .voice-hint{margin-top:16px;font-size:14px;font-weight:700;color:var(--muted);
    text-align:center;min-height:20px;max-width:90%;line-height:1.5;}

  /* ===== 운동 기록 확인 카드 ===== */
  .log-confirm{align-self:flex-start;max-width:85%;background:#fff;
    border:1.5px solid var(--blue);border-radius:14px;padding:13px 15px;margin-top:-2px;}
  .lc-label{font-size:14.5px;font-weight:800;color:var(--ink);}
  .lc-q{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .lc-btns{display:flex;gap:8px;margin-top:11px;}
  .lc-yes{flex:1;background:var(--blue);color:#fff;border-radius:10px;
    padding:9px;font-size:13.5px;font-weight:800;transition:.13s;}
  .lc-yes:hover{filter:brightness(.94);}
  .lc-no{flex:1;background:#F0F0EE;color:var(--muted);border-radius:10px;
    padding:9px;font-size:13.5px;font-weight:800;transition:.13s;}
  .lc-no:hover{background:#E4E4E1;}
  .lc-done{font-size:13px;font-weight:800;color:var(--blue);text-align:center;padding:3px 0;}
  .clamp{display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;}
  .card-actions{display:flex;gap:18px;align-items:center;
    border-top:1px dashed var(--line);padding-top:10px;}
  .act{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
    color:var(--muted);transition:.12s;}
  .act svg{width:17px;height:17px;}
  .act.like.on{color:var(--blue);}
  .act.like:hover{color:var(--blue);}
  .act.reply:hover{color:var(--ink);}
  .act .pop{animation:pop .3s ease;}
  @keyframes pop{50%{transform:scale(1.35);}}

  .detail{padding:0 0 130px;display:none;}
  .detail-bar{position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;
    display:flex;align-items:center;gap:12px;padding:14px 16px;}
  .back{display:flex;align-items:center;gap:6px;font-weight:800;font-size:14px;color:#fff;}
  .back svg{width:18px;height:18px;}
  .detail-body{padding:16px;}
  .replies-head{font-size:12px;font-weight:800;letter-spacing:.04em;
    color:var(--muted);margin:18px 2px 10px;}
  .reply{background:var(--card);border:1.5px solid var(--line);border-radius:13px;
    padding:13px 14px 10px;margin-bottom:9px;animation:rise .35s backwards;}
  .reply .body-txt{font-size:13.8px;margin:6px 0 9px;}
  .reply .card-actions{padding-top:8px;}
  .empty-r{text-align:center;color:var(--muted);font-size:13px;font-weight:600;padding:26px 0;}

  .reply-dock{position:sticky;bottom:0;background:var(--paper);
    border-top:2px dashed var(--line);padding:11px 14px;
    padding-bottom:calc(11px + env(safe-area-inset-bottom));
    display:flex;gap:9px;align-items:flex-end;}
  .reply-dock textarea{flex:1;border:1.5px solid var(--line);border-radius:13px;
    padding:10px 13px;font-size:14px;resize:none;background:var(--card);
    max-height:120px;outline:none;line-height:1.5;}
  .reply-dock textarea:focus{border-color:var(--ink);}
  .reply-dock .send{flex:none;background:var(--ink);color:#fff;font-weight:800;
    font-size:13px;padding:11px 16px;border-radius:13px;transition:.13s;}
  .reply-dock .send:disabled{background:var(--line);color:var(--muted);}
  .reply-dock .send:not(:disabled):hover{opacity:.82;}

  .fab{position:fixed;bottom:84px;z-index:35;left:50%;
    transform:translateX(calc(340px - 100% - 18px));
    width:56px;height:56px;border-radius:50%;background:var(--ink);color:#fff;
    box-shadow:0 10px 26px -6px rgba(10,10,10,.5);display:grid;place-items:center;transition:.15s;}
  .fab:hover{transform:translateX(calc(340px - 100% - 18px)) scale(1.07);}
  .fab svg{width:26px;height:26px;}
  .fab-report{bottom:152px;background:#C0392B;
    box-shadow:0 10px 26px -6px rgba(192,57,28,.55);}
  .fab-report:hover{transform:translateX(calc(340px - 100% - 18px)) scale(1.07);}
  .fab-dot{position:absolute;top:9px;right:9px;width:12px;height:12px;
    border-radius:50%;background:#fff;border:2.5px solid #C0392B;}
  @media(max-width:720px){.fab{left:auto;right:18px;transform:none;}
    .fab:hover{transform:scale(1.07);}
    .fab-report:hover{transform:scale(1.07);}}

  .scrim{position:fixed;inset:0;z-index:60;background:rgba(10,10,10,.55);
    display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
  .scrim.show{display:flex;animation:fade .2s;}
  @keyframes fade{from{opacity:0;}}
  .modal{background:var(--paper);width:100%;max-width:680px;
    border-radius:22px 22px 0 0;border-top:3px solid var(--ink);
    padding:20px 18px calc(22px + env(safe-area-inset-bottom));
    animation:up .26s cubic-bezier(.2,.8,.2,1);}
  @keyframes up{from{transform:translateY(100%);}}
  .modal h3{font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;margin-bottom:3px;}
  .modal .sub{font-size:12.5px;color:var(--muted);margin-bottom:15px;}
  .cat-pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;}
  .cat-pick button{font-size:12px;font-weight:800;padding:7px 12px;border-radius:999px;
    border:1.5px solid var(--line);color:var(--muted);transition:.12s;}
  .cat-pick button.on{border-color:var(--ink);color:#fff;background:var(--ink);}
  .modal textarea,.modal input{width:100%;border:1.5px solid var(--line);border-radius:13px;
    padding:13px;font-size:14.5px;background:var(--card);outline:none;}
  .modal textarea{min-height:118px;resize:none;line-height:1.55;}
  .modal textarea:focus,.modal input:focus{border-color:var(--ink);}
  .modal-foot{display:flex;gap:9px;margin-top:14px;}
  .modal-foot button{flex:1;padding:13px;border-radius:13px;font-weight:800;font-size:14px;}
  .btn-ghost{border:1.5px solid var(--line);color:var(--muted);}
  .btn-solid{background:var(--ink);color:#fff;transition:.13s;}
  .btn-solid:hover{opacity:.82;}
  .btn-solid:disabled{background:var(--line);color:var(--muted);}

  .skel{height:118px;background:linear-gradient(100deg,var(--card) 30%,
    var(--bg) 50%,var(--card) 70%);background-size:200% 100%;
    animation:sh 1.2s infinite;border-radius:16px;margin-bottom:11px;border:1.5px solid var(--line);}
  @keyframes sh{to{background-position:-200% 0;}}
  .empty{text-align:center;padding:50px 30px;color:var(--muted);}
  .empty .big{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;
    color:var(--ink);margin:10px 0 5px;}
  .empty p{font-size:13px;}
  .act.del{margin-left:auto;color:#C0392B;}
  .act.del:hover{color:#C0392B;opacity:.7;}
  .act.report{color:var(--muted);}
  .act.report:hover{color:#C0392B;}
  .act.report.done{color:#C0392B;opacity:.5;}
  .report-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;
    font-weight:800;color:#fff;background:#C0392B;border-radius:999px;
    padding:3px 9px;margin-left:6px;white-space:nowrap;flex:none;}
  .report-badge svg{width:12px;height:12px;flex:none;}
  .rep-card{background:var(--card);border:1.5px solid #E8C5C0;border-radius:14px;
    padding:14px 15px;margin-bottom:11px;}
  .rep-card .rtype{font-size:10.5px;font-weight:800;letter-spacing:.04em;
    color:#C0392B;border:1.3px solid #C0392B;border-radius:999px;padding:2px 8px;}
  .rep-reason{font-size:12px;font-weight:700;color:#C0392B;margin:8px 0 2px;}
  .rep-content{font-size:13.5px;background:var(--bg);border-radius:9px;
    padding:9px 11px;margin:7px 0 11px;white-space:pre-wrap;word-break:break-word;
    max-height:120px;overflow:auto;}
  .rep-foot{display:flex;gap:8px;}
  .rep-foot button{flex:1;padding:9px;border-radius:10px;font-weight:800;font-size:12.5px;}
  .rep-del{background:#C0392B;color:#fff;}
  .rep-ignore{border:1.5px solid var(--line);color:var(--muted);}
  #topbar{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .toast{position:fixed;left:50%;bottom:150px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:13px;font-weight:700;
    padding:11px 18px;border-radius:999px;z-index:80;opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>

<!-- 인앱 브라우저(카톡 등) 안내 배너 -->
<div id="inappBanner" style="display:none">
  <div class="iab-inner">
    <div class="iab-emoji">🌐</div>
    <div class="iab-title">외부 브라우저로 열어주세요</div>
    <div class="iab-desc" id="iabDesc">카카오톡 등 앱 안에서는 구글 로그인이
      제한돼요. 아래 안내를 따라 크롬/사파리로 열어주세요.</div>
    <!-- 아이폰 단계 안내 (JS가 표시) -->
    <div class="iab-steps" id="iabSteps" style="display:none">
      <div class="iab-step-simple">하단 메뉴 <b>↗</b> → <b>Safari로 열기</b></div>
    </div>
    <button class="iab-btn" id="iabOpen">크롬으로 열기</button>
    <button class="iab-copy" id="iabCopy">주소 복사하기</button>
    <button class="iab-close" id="iabClose">그냥 둘러보기 (로그인 없이)</button>
  </div>
</div>

<!-- ▼▼▼ SUPABASE 라이브러리 ▼▼▼ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="shell">
  <header>
    <div class="topbar" id="topbar">
      <div class="hdr-left">
        <svg class="cog" viewBox="0 0 100 100" fill="none">
          <path fill="#FFFFFF" d="M50 8l6 11 13-3 2 13 13 4-6 12 9 10-11 8 2 13-13 1-4 13-12-6-12 6-4-13-13-1 2-13-11-8 9-10-6-12 13-4 2-13 13 3z"/>
          <circle cx="50" cy="50" r="16" fill="#0A0A0A"/>
          <circle cx="50" cy="50" r="6" fill="#FFFFFF"/>
        </svg>
      </div>

function ago(iso){
  const d=(Date.now()-new Date(iso).getTime())/1000;
  if(d<60)return '방금';
  if(d<3600)return Math.floor(d/60)+'분 전';
  if(d<86400)return Math.floor(d/3600)+'시간 전';
  if(d<604800)return Math.floor(d/86400)+'일 전';
  return new Date(iso).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
}

const MAX_IMAGES=4;
/* 이미지 주소 목록 안전 파싱 */
function imgList(v){
  if(!v)return [];
  if(Array.isArray(v))return v;
  try{const a=JSON.parse(v);return Array.isArray(a)?a:[];}catch(e){return [];}
}
/* 사진 격자 HTML */
function imgGrid(urls){
  const a=imgList(urls);
  if(!a.length)return '';
  const n=Math.min(a.length,4);
  return `<div class="img-grid n${n}">`+
    a.slice(0,4).map(u=>`<div class="gi" data-img="${esc(u)}"><img src="${esc(u)}" loading="lazy" alt=""></div>`).join('')+
    `</div>`;
}
/* 사진을 브라우저에서 적당히 줄여 업로드 (속도·용량 절약) */
function shrinkImage(file){
  return new Promise((resolve)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{img.src=e.target.result;};
    img.onload=()=>{
      const max=1280;
      let{width:w,height:h}=img;
      if(w>max||h>max){const r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>resolve(b||file),'image/jpeg',0.82);
    };
    img.onerror=()=>resolve(file);
    reader.readAsDataURL(file);
  });
}
/* 파일들을 Storage에 올리고 공개 URL 배열 반환 */
async function uploadImages(files){
  const urls=[];
  for(const f of files){
    const blob=await shrinkImage(f);
    const name=Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.jpg';
    const {error}=await db.storage.from('post-images').upload(name,blob,{contentType:'image/jpeg'});
    if(error){console.error(error);throw error;}
    const {data}=db.storage.from('post-images').getPublicUrl(name);
    urls.push(data.publicUrl);
  }
  return urls;
}

/* ---------- Supabase 에서 글 불러오기 ---------- */
async function loadThreads(){
  const {data:threads,error}=await db.from('threads').select('*');
  if(error){console.error(error);
    document.getElementById('feed').innerHTML=
      `<div class="empty"><div style="font-size:30px">⚠️</div>
       <div class="big">데이터를 불러오지 못했어요</div>
       <p>인터넷 연결을 확인하거나 새로고침 해주세요.</p></div>`;
    return false;}
  const {data:replies}=await db.from('replies').select('*');
  const byThread={};
  (replies||[]).forEach(r=>{(byThread[r.thread_id]=byThread[r.thread_id]||[]).push(r);});
  state.threads=threads.map(t=>({...t,replies:byThread[t.id]||[]}));
  return true;
}

/* ---------- 피드 ---------- */
function threadCard(th){
  const c=catOf(th.category);
  const liked=state.liked.has('t'+th.id);
  const rep=state.reported.has('thread:'+th.id);
  const rcount=state.admin?reportCount('thread',th.id):0;
  return `<article class="card" data-id="${th.id}">
    <div class="card-top"><span class="cat-chip">${c.name}</span>
      <span class="time">${ago(th.created_at)}</span>
      ${rcount>0?`<span class="report-badge">${icFlag} 신고 ${rcount}</span>`:''}</div>
    <div class="author"><span class="av-s">${initial(th.author)}</span>${esc(th.author)}
      ${th.is_op?'<span class="op">OUSTALETI</span>':''}</div>
    <div class="body-txt clamp">${esc(th.body)}</div>
    ${imgGrid(th.images)}
    <div class="card-actions">
      <button class="act like ${liked?'on':''}" data-like="${th.id}">
        ${icHeart(liked)}<span>${th.likes||0}</span></button>
      <button class="act reply">${icChat}<span>${th.replies?.length||0}</span></button>
      <button class="act report ${rep?'done':''}" data-reportthread="${th.id}">${icFlag}<span>신고</span></button>
      ${state.admin?`<button class="act del" data-delthread="${th.id}">${icTrash}<span>삭제</span></button>`:''}
    </div></article>`;
}
function renderFeed(){
  let list=state.threads.slice();
  if(state.cat!=='all')list=list.filter(t=>t.category===state.cat);
  list.sort((a,b)=>state.sort==='hot'?hot(b)-hot(a)
    :new Date(b.created_at)-new Date(a.created_at));
  document.getElementById('count').textContent=`토론 ${list.length}`;
  const feed=document.getElementById('feed');
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div style="font-size:34px">🚲</div>
      <div class="big">아직 글이 없어요</div>
      <p>이 토픽의 첫 라이더가 되어보세요.</p></div>`;
    return;
  }
  feed.innerHTML=list.map((t,i)=>threadCard(t).replace('<article class="card"',
    `<article class="card" style="animation-delay:${Math.min(i*45,360)}ms"`)).join('');
  feed.querySelectorAll('.card').forEach(card=>{
    const id=card.dataset.id;

/* ---------- 좋아요 (Supabase 에 숫자 갱신) ---------- */
async function toggleLike(threadId,replyId,btn){
  if(!state.user){openLoginPrompt();return;}
  const th=state.threads.find(t=>String(t.id)===String(threadId));if(!th)return;
  const isReply=!!replyId;
  const target=isReply?(th.replies||[]).find(r=>String(r.id)===String(replyId)):th;
  if(!target)return;
  const key=(isReply?'r':'t')+target.id;
  const add=!state.liked.has(key);
  const newLikes=Math.max(0,(target.likes||0)+(add?1:-1));
  target.likes=newLikes;
  if(add){state.liked.add(key);const ic=btn.querySelector('svg');if(ic)ic.classList.add('pop');}
  else state.liked.delete(key);
  lset('ost_liked',JSON.stringify([...state.liked]));
  if(state.view==='detail')renderDetail();else renderFeed();
  const tbl=isReply?'replies':'threads';
  const {error}=await db.from(tbl).update({likes:newLikes}).eq('id',target.id);
  if(error){console.error(error);toast('좋아요 저장에 실패했어요');}
}

const REPORT_REASONS=['욕설·비방','도배·반복글','스팸·광고','음란·불쾌함','기타'];
function reportCount(type,id){
  return state.reports.filter(r=>r.target_type===type&&String(r.target_id)===String(id)).length;
}
/* 신고당한 대상의 글/댓글 본문 찾기 (신고 기록에 함께 저장) */
function findContent(type,id){
  if(type==='thread'){
    const t=state.threads.find(x=>String(x.id)===String(id));
    return t?t.body:'';
  }
  for(const t of state.threads){
    const r=(t.replies||[]).find(x=>String(x.id)===String(id));
    if(r)return r.body;
  }
  return '';
}
function openReport(type,id){
  if(!state.user){openLoginPrompt();return;}
  const key=type+':'+id;
  if(state.reported.has(key)){toast('이미 신고한 글이에요');return;}
  document.getElementById('modal').innerHTML=`
    <h3>${type==='thread'?'글':'댓글'} 신고하기</h3>
    <p class="sub">신고 사유를 선택해 주세요. 운영팀이 확인 후 조치합니다.</p>
    <div class="cat-pick" id="repPick">
      ${REPORT_REASONS.map((r,i)=>`<button data-r="${r}" class="${i===0?'on':''}">${r}</button>`).join('')}
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="mClose">취소</button>
      <button class="btn-solid" id="repSend">신고 접수</button>
    </div>`;
  showScrim();
  let chosen=REPORT_REASONS[0];
  document.getElementById('repPick').querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{chosen=b.dataset.r;
      document.querySelectorAll('#repPick button').forEach(x=>x.classList.toggle('on',x===b));};

    btn.disabled=true;btn.textContent='접수 중...';
    const {error}=await db.from('reports').insert({
      target_type:type,target_id:id,reason:chosen,
      reporter:state.nick,content:findContent(type,id)});
    if(error){console.error(error);btn.disabled=false;btn.textContent='신고 접수';
      toast('신고 접수에 실패했어요');return;}
    state.reported.add(key);

function openReportBox(){

    b.onclick=()=>{const[t,i]=b.dataset.rdel.split('|');reportResolve(t,i,true);};
  });
  document.getElementById('modal').querySelectorAll('[data-rignore]').forEach(b=>{
    b.onclick=()=>{const[t,i]=b.dataset.rignore.split('|');reportResolve(t,i,false);};
  });

/* 신고 처리: del=true면 글/댓글 삭제, false면 신고만 지움(무시) */
async function reportResolve(type,id,del){
  const label=type==='thread'?'글':'댓글';
  if(del){
    if(!confirm(`이 ${label}을(를) 삭제할까요?\n되돌릴 수 없습니다.`))return;
    const tbl=type==='thread'?'threads':'replies';
    const {error}=await db.from(tbl).delete().eq('id',id);
    if(error){console.error(error);toast('삭제에 실패했어요');return;}
  }else{
    if(!confirm('이 신고를 무시(반려)할까요?\n신고 기록만 삭제됩니다.'))return;
  }
  /* 해당 대상의 신고 기록 삭제 */
  await db.from('reports').delete().eq('target_type',type).eq('target_id',id);
  await loadReports();
  await loadThreads();
  toast(del?`${label}을 삭제하고 신고를 처리했어요`:'신고를 무시했어요');
  openReportBox();
  renderTabs();renderFeed();
  if(state.view==='detail'){
    state.thread=state.threads.find(t=>String(t.id)===String(state.thread?.id));
    if(!state.thread)closeDetail();
  }
}

    let images=[];
    try{ if(pickedFiles.length)images=await uploadImages(pickedFiles); }
    catch(e){save.textContent='등록하기';save.disabled=false;
      toast('사진 업로드에 실패했어요');return;}
    save.textContent='등록 중...';
    const {error}=await db.from('threads').insert({
      category:state.composeCat,author:state.nick,body,is_op:false,likes:0,images});
    if(error){console.error(error);save.textContent='등록하기';save.disabled=false;

/* ---------- 댓글 ---------- */
let replyFiles=[];
function drawReplyPreview(){
  const preview=document.getElementById('replyPreview');
  preview.innerHTML=replyFiles.map((f,i)=>
    `<div class="pv"><img src="${URL.createObjectURL(f)}"><div class="rm" data-rm="${i}">✕</div></div>`).join('');
  preview.querySelectorAll('[data-rm]').forEach(x=>{
    x.onclick=()=>{replyFiles.splice(+x.dataset.rm,1);drawReplyPreview();updateReplySend();};
  });
}
function updateReplySend(){
  const ta=document.getElementById('replyInput');
  document.getElementById('replySend').disabled=!(ta.value.trim()||replyFiles.length);
}
async function sendReply(){
  const ta=document.getElementById('replyInput');
  const body=ta.value.trim();
  if((!body&&!replyFiles.length)||!state.thread)return;
  if(!state.user){openLoginPrompt();return;}
  const send=document.getElementById('replySend');
  send.disabled=true;send.textContent=replyFiles.length?'사진...':'...';
  let images=[];
  try{ if(replyFiles.length)images=await uploadImages(replyFiles); }
  catch(e){send.disabled=false;send.textContent='등록';toast('사진 업로드에 실패했어요');return;}
  const {error}=await db.from('replies').insert({
    thread_id:state.thread.id,author:state.nick,body:body||'',likes:0,images});
  send.textContent='등록';
  if(error){console.error(error);send.disabled=false;
    toast('댓글 등록에 실패했어요');return;}
  ta.value='';ta.style.height='auto';replyFiles=[];drawReplyPreview();
  const id=state.thread.id;
  await loadThreads();
  state.thread=state.threads.find(t=>String(t.id)===String(id));
  renderDetail();
}

/* ---------- 하단 탭 전환 (커뮤니티 / 비서 / 내 상태) ---------- */
function switchTab(tab){
  /* 페이지 표시 */
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  /* 네비 활성 표시 */
  document.querySelectorAll('.nav-item').forEach(n=>
    n.classList.toggle('on',n.dataset.tab===tab));
  /* 커뮤니티 전용 요소(글쓰기 버튼, 토픽탭, 신고함)는 커뮤니티에서만 */
  const isCommunity=(tab==='community');
  document.getElementById('fab').style.display=(isCommunity&&state.view==='feed')?'grid':'none';
  document.getElementById('tabs').style.display=isCommunity?'flex':'none';
  if(isCommunity)paintReportFab(); else document.getElementById('fabReport').style.display='none';
  /* 커뮤니티로 올 땐 상세화면이 아닌 피드부터 */
  if(isCommunity&&state.view==='detail')closeDetail();
  /* 내 상태 탭이면 현재 선택된 서브탭(대시보드/프로필) 그리기 */
  if(tab==='status')renderSubPane();
  /* 비서 탭이면 음성 화면 그리기 */
  if(tab==='assistant')renderVoice();
  else stopVoice(); /* 다른 탭으로 가면 음성·읽기 중지 */
  lset('ost_tab',tab); /* 새로고침 시 현재 탭 유지 */
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav-item').forEach(n=>{
  n.onclick=()=>switchTab(n.dataset.tab);
});
document.querySelectorAll('.sub-tab').forEach(b=>{
  b.onclick=()=>switchSub(b.dataset.sub);
});

/* ---------- 대회 일정 (여러 개) ---------- */
async function loadRaces(){
  if(!state.user){state.races=[];return;}
  try{
    const {data}=await db.from('races').select('*')
      .eq('user_id',state.user.id).order('race_date',{ascending:true});
    state.races=data||[];
  }catch(e){state.races=[];}
}
function renderRaceList(){
  const box=document.getElementById('raceList');
  if(!box)return;
  if(!state.races.length){
    box.innerHTML=`<div class="race-empty">아직 등록한 대회가 없어요.</div>`;
    return;
  }
  const today=new Date(new Date().toDateString());
  box.innerHTML=state.races.map(r=>{
    const t=new Date(r.race_date+'T00:00:00');
    const d=Math.ceil((t-today)/86400000);
    const dtxt=d>0?`D-${d}`:(d===0?'D-DAY':`종료`);
    return `<div class="race-item">
      <div class="race-info">
        <span class="race-nm">${esc(r.name||'대회')}</span>
        <span class="race-dt">${r.race_date} · ${dtxt}</span>
      </div>
      <button type="button" class="race-del" data-race="${r.id}">&times;</button>
    </div>`;
  }).join('');
  box.querySelectorAll('[data-race]').forEach(b=>{
    b.onclick=()=>delRace(b.dataset.race);
  });
}
async function addRace(){
  if(!state.user)return;
  const nm=document.getElementById('raceName').value.trim();
  const dt=document.getElementById('raceDate').value;
  if(!nm){toast('대회 이름을 입력해주세요');return;}
  if(!dt){toast('대회 날짜를 골라주세요');return;}
  try{
    const {data,error}=await db.from('races')
      .insert({user_id:state.user.id,name:nm,race_date:dt}).select();
    if(error)throw error;
    if(data&&data[0]){
      state.races.push(data[0]);
      state.races.sort((a,b)=>a.race_date.localeCompare(b.race_date));
    }
    document.getElementById('raceName').value='';
    document.getElementById('raceDate').value='';
    renderRaceList();
    toast('대회를 추가했어요');
  }catch(e){console.error(e);toast('추가에 실패했어요');}
}
async function delRace(id){
  try{
    const {error}=await db.from('races').delete().eq('id',id);
    if(error)throw error;
    state.races=state.races.filter(r=>String(r.id)!==String(id));
    renderRaceList();
    toast('대회를 삭제했어요');
  }catch(e){console.error(e);toast('삭제에 실패했어요');}
}

/* ---------- 체중 추적 ---------- */
async function loadWeights(){
  if(!state.user){state.weights=[];return;}
  try{
    const {data}=await db.from('weights').select('*')
      .eq('user_id',state.user.id).order('log_date',{ascending:true});
    state.weights=data||[];
  }catch(e){state.weights=[];}
}
function renderWeightCard(){
  const box=document.getElementById('wtCard');
  if(!box)return;
  const ws=state.weights.slice().sort((a,b)=>a.log_date.localeCompare(b.log_date));
  const p=state.profile||{};
  const target=p.target_weight;
  const start=ws.length?ws[0].weight:null;
  const cur=ws.length?ws[ws.length-1].weight:null;

  /* 진행률 계산 */
  let progressHtml='';
  if(target!=null&&start!=null&&cur!=null){
    const totalChange=start-target;        /* 줄여야 할 양 (양수=감량) */
    const doneChange=start-cur;            /* 지금까지 변화 */
    let pct = totalChange!==0 ? Math.round((doneChange/totalChange)*100) : 100;
    pct=Math.max(0,Math.min(100,pct));
    const remain=(cur-target);
    const remainTxt = Math.abs(remain)<0.05 ? '목표 달성! 🎉'
      : (remain>0?`${remain.toFixed(1)}kg 남음`:`목표보다 ${Math.abs(remain).toFixed(1)}kg 아래`);
    /* 도달 예측 — 최근 추세 */
    let predict='';
    if(ws.length>=2&&remain>0){
      const first=ws[0], last=ws[ws.length-1];
      const days=Math.max(1,(new Date(last.log_date)-new Date(first.log_date))/86400000);
      const rate=(first.weight-last.weight)/days; /* kg/일 (양수=감량중) */
      if(rate>0.001){
        const daysLeft=Math.ceil(remain/rate);
        const eta=new Date(); eta.setDate(eta.getDate()+daysLeft);
        predict=`이 속도면 ${eta.getMonth()+1}월 ${eta.getDate()}일쯤 도달`;
      }else{
        predict='최근 변화가 적어요 — 꾸준히 가봐요';
      }
    }
    progressHtml=`
      <div class="wt-goal">
        <div class="wt-goal-row">
          <span>시작 ${start}kg</span><span>현재 <b>${cur}kg</b></span><span>목표 ${target}kg</span>
        </div>
        <div class="wt-bar"><div class="wt-bar-fill" style="width:${pct}%"></div></div>
        <div class="wt-goal-foot">
          <span class="wt-pct">${pct}% 달성</span>
          <span>${remainTxt}</span>
        </div>
        ${predict?`<div class="wt-predict">📈 ${predict}</div>`:''}
      </div>`;
  }else if(target==null){
    progressHtml=`<div class="wt-hint">프로필에서 "체중감량" 목표와 목표 체중을 설정하면,

  }else{
    progressHtml=`<div class="wt-hint">오늘 몸무게를 입력하면 목표까지 진행률이 계산돼요.</div>`;
  }

  /* 최근 추이 (마지막 7개) */
  let recent='';
  if(ws.length){
    const last7=ws.slice(-7);
    recent=`<div class="wt-recent-head">최근 기록</div>
      <div class="wt-recent">`+last7.map((w,i)=>{
        const prev=i>0?last7[i-1].weight:null;
        const diff=prev!=null?(w.weight-prev):null;
        const dtag=diff==null?'':(diff<0?`<span class="wt-d down">▼${Math.abs(diff).toFixed(1)}</span>`
          :diff>0?`<span class="wt-d up">▲${diff.toFixed(1)}</span>`:`<span class="wt-d">-</span>`);
        return `<div class="wt-rec-item">
          <span class="wt-rec-date">${w.log_date.slice(5).replace('-','/')}</span>
          <span class="wt-rec-w">${w.weight}kg ${dtag}</span></div>`;
      }).join('')+`</div>`;
  }

  box.innerHTML=`
    <div class="pf-sec-title" style="margin-bottom:14px">⚖️ 체중 추적</div>
    <div class="wt-input-row">
      <input id="wtDate" type="date" value="${todayStr()}">

      <button class="wt-add-btn" id="wtAddBtn">기록</button>
    </div>
    ${progressHtml}
    ${recent}`;

  document.getElementById('wtAddBtn').onclick=addWeight;
}
async function addWeight(){

    const existing=state.weights.find(x=>x.log_date===dt);

      "값을 못 찾으면 그 항목은 null. 숫자만, 단위 빼고.";
    const res=await fetch(`${SUPABASE_URL}/functions/v1/chat`,{

  }

/* 이미지 축소 + base64 변환 (data: 접두사 제거) */
function shrinkImage(file,maxSide){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=()=>{img.src=reader.result;};
    reader.onerror=reject;
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxSide||h>maxSide){
        if(w>=h){h=Math.round(h*maxSide/w);w=maxSide;}
        else{w=Math.round(w*maxSide/h);h=maxSide;}
      }
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',0.85);
      resolve({b64:dataUrl.split(',')[1],mime:'image/jpeg'});
    };
    img.onerror=reject;
    reader.readAsDataURL(file);
  });
}

/* 요약 카드 — 이번주 운동량 / 수행능력 / 대회 D-day */
function buildSummary(){
  const now=new Date();
  const dayMs=86400000;
  /* 이번 주(최근7일) vs 지난 주(8~14일 전) */
  const inRange=(iso,from,to)=>{
    const t=new Date(iso).getTime();
    return t>=from&&t<to;
  };
  const tNow=now.getTime();
  const thisFrom=tNow-7*dayMs, lastFrom=tNow-14*dayMs;
  const ws=state.workouts||[];
  const thisWk=ws.filter(w=>inRange(w.created_at,thisFrom,tNow));
  const lastWk=ws.filter(w=>inRange(w.created_at,lastFrom,thisFrom));

  /* 1) 운동량 = 횟수 */
  const tc=thisWk.length, lc=lastWk.length;
  let volSub, volCls='';
  if(lc===0){ volSub = tc>0?'첫 주 기록 중':'기록 없음'; }
  else{
    const diff=tc-lc;
    const pct=Math.round((diff/lc)*100);
    if(diff>0){volSub=`지난주 ▲ ${pct}%`;volCls='up';}
    else if(diff<0){volSub=`지난주 ▼ ${Math.abs(pct)}%`;volCls='down';}
    else{volSub='지난주와 동일';}
  }

  /* 2) 수행능력 = 무산소 종목별 추정 1RM 비교 (최근 vs 처음) */
  /* Epley 공식: 1RM = 무게 × (1 + 횟수/30) */
  const oneRM=w=>{
    if(w.weight==null)return null;
    const reps=w.reps||1;
    return w.weight*(1+reps/30);
  };
  let perfMain='—', perfSub='기록이 쌓이는 중', perfCls='';
  const anByEx={};
  ws.filter(w=>w.type==='무산소'&&w.weight!=null&&w.exercise)
    .forEach(w=>{(anByEx[w.exercise.trim()]=anByEx[w.exercise.trim()]||[]).push(w);});
  /* 가장 많이 한(기록 수 많은) 종목 우선, 향상폭 큰 것 우선 */
  let bestImprove=null;
  for(const ex in anByEx){
    const arr=anByEx[ex].slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    if(arr.length>=2){
      const firstRM=oneRM(arr[0]), lastRM=oneRM(arr[arr.length-1]);
      if(firstRM&&lastRM&&firstRM>0){
        const pct=Math.round(((lastRM-firstRM)/firstRM)*100);
        if(bestImprove===null||Math.abs(pct)>Math.abs(bestImprove.pct)){
          bestImprove={ex,pct,lastRM};
        }
      }
    }
  }
  if(bestImprove){
    perfMain=bestImprove.ex;
    if(bestImprove.pct>0){perfSub=`1RM +${bestImprove.pct}% ▲`;perfCls='up';}
    else if(bestImprove.pct<0){perfSub=`1RM ${bestImprove.pct}% ▼`;perfCls='down';}
    else{perfSub='1RM 유지';}
  }

  /* 3) 예상 소모 칼로리 (이번 주, MET 추정) */
  const weight=(state.profile&&state.profile.weight)?state.profile.weight:70; /* 체중 없으면 70kg 가정 */
  /* 운동별 MET 계수 (대략) */
  const metOf=w=>{
    const ex=(w.exercise||'').toLowerCase();
    if(w.type==='유산소'){
      if(ex.includes('러닝')||ex.includes('run')||ex.includes('달리')) return 9.8;
      if(ex.includes('자전거')||ex.includes('사이클')||ex.includes('bike')||ex.includes('cycl')) return 7.5;
      if(ex.includes('수영')||ex.includes('swim')) return 8.0;
      if(ex.includes('걷')||ex.includes('walk')) return 3.5;
      return 7.0; /* 기타 유산소 */
    }
    return 5.0; /* 무산소 웨이트 평균 */
  };
  /* 시간(분): 유산소는 duration, 무산소는 세트당 약 3분 추정 */
  const minsOf=w=>{
    if(w.type==='유산소') return w.duration||0;
    return (w.sets||0)*3;
  };
  let kcal=0;
  thisWk.forEach(w=>{
    const mins=minsOf(w);
    if(mins>0) kcal += metOf(w)*weight*(mins/60); /* MET*kg*hour */
  });
  kcal=Math.round(kcal);
  const kcalCard=`<div class="sum-card">
    <div class="sc-label">이번 주 소모</div>
    <div class="sc-main" style="font-size:19px">${kcal>0?kcal.toLocaleString():'—'}</div>
    <div class="sc-sub">${kcal>0?'kcal · 예상치':'기록하면 계산'}</div></div>`;

  /* 4) 대회 D-day — 가장 가까운(다가오는) 대회 */
  let raceCard='';
  const today=new Date(now.toDateString());
  const upcoming=(state.races||[])
    .map(r=>({...r,t:new Date(r.race_date+'T00:00:00')}))
    .filter(r=>r.t>=today)
    .sort((a,b)=>a.t-b.t)[0];
  if(upcoming){
    const dleft=Math.ceil((upcoming.t-today)/dayMs);
    const dtxt=dleft>0?`D-${dleft}`:'D-DAY';
    raceCard=`<div class="sum-card race">
      <div class="sc-label">🏁 ${esc((upcoming.name||'대회').slice(0,6))}</div>
      <div class="sc-main">${dtxt}</div>
      <div class="sc-sub">${upcoming.race_date.slice(5).replace('-','/')}</div></div>`;
  }

  /* 5) 체중 목표 카드 */
  let weightCard='';
  const tw=state.profile&&state.profile.target_weight;
  const wsAll=(state.weights||[]).slice().sort((a,b)=>a.log_date.localeCompare(b.log_date));
  if(tw!=null&&wsAll.length){
    const startW=wsAll[0].weight, curW=wsAll[wsAll.length-1].weight;
    const total=startW-tw, done=startW-curW;
    let pct=total!==0?Math.round((done/total)*100):100;
    pct=Math.max(0,Math.min(100,pct));
    const remain=(curW-tw);
    const rtxt=Math.abs(remain)<0.05?'달성!':`${Math.abs(remain).toFixed(1)}kg ${remain>0?'남음':'초과'}`;
    weightCard=`<div class="sum-card">
      <div class="sc-label">목표 체중</div>
      <div class="sc-main">${pct}%</div>
      <div class="sc-sub ${remain<=0?'up':''}">${rtxt}</div></div>`;
  }

  return `<div class="sum-grid">
    <div class="sum-card">
      <div class="sc-label">이번 주 운동</div>
      <div class="sc-main">${tc}회</div>
      <div class="sc-sub ${volCls}">${volSub}</div>
    </div>
    <div class="sum-card">
      <div class="sc-label">수행 능력</div>
      <div class="sc-main" style="font-size:${perfMain==='—'?'22px':'15px'}">${perfMain}</div>
      <div class="sc-sub ${perfCls}">${perfSub}</div>
    </div>
    ${kcalCard}
    ${weightCard}
    ${raceCard}
  </div>`;
}

  lines.push("유산소 형식: [[LOG|유산소|종목|거리|시간분]] 예) [[LOG|유산소|러닝|5|30]]");
  lines.push("값을 모르면 빈칸으로 두세요. 예) [[LOG|유산소|사이클||30]] (거리 모름). 태그는 사용자에게 설명하지 말고 그냥 끝에 붙이기만 하세요.");
  lines.push("---아래는 사용자 정보입니다---");

/* AI 답변에서 [[LOG|...]] 추출 → {표시텍스트, row} 반환, 그리고 표시용 텍스트는 제거 */
function extractWorkoutLog(reply){
  const m=reply.match(/\[\[LOG\|([^\]]*)\]\]/);
  if(!m)return {clean:reply,log:null};
  const clean=reply.replace(/\[\[LOG\|[^\]]*\]\]/,'').trim();
  const parts=m[1].split('|').map(s=>s.trim());
  const type=parts[0];
  const numOr=v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
  let log=null, label='';
  if(type==='무산소'){
    log={type:'무산소',exercise:parts[1]||'운동',weight:numOr(parts[2]),reps:numOr(parts[3]),sets:numOr(parts[4]),distance:null,duration:null};
    label=`💪 ${log.exercise} ${log.weight?log.weight+'kg ':''}${log.reps?log.reps+'회 ':''}${log.sets?log.sets+'세트':''}`.trim();
  }else if(type==='유산소'){
    log={type:'유산소',exercise:parts[1]||'운동',weight:null,reps:null,sets:null,distance:numOr(parts[2]),duration:numOr(parts[3])};
    label=`🏃 ${log.exercise} ${log.distance?log.distance+'km ':''}${log.duration?log.duration+'분':''}`.trim();
  }
  if(log)log.label=label;
  return {clean,log};
}

function wireLogCards(){
  document.querySelectorAll('.log-confirm').forEach(card=>{

function setVoiceHint(t){const e=document.getElementById('voiceHint');if(e)e.textContent=t;}
function setMicState(cls){
  const b=document.getElementById('micBtn');if(!b)return;
  b.classList.remove('listening','thinking');
  if(cls)b.classList.add(cls);
}
function toggleListen(){
  if(state.listening){stopVoice();return;}
  if(state.speaking){window.speechSynthesis.cancel();state.speaking=false;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const recog=new SR();
  recog.lang='ko-KR';
  recog.interimResults=true;
  recog.continuous=false;
  state.recog=recog;
  let finalText='';
  recog.onstart=()=>{state.listening=true;setMicState('listening');setVoiceHint('듣고 있어요... 말씀하세요');};
  recog.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)finalText+=t; else interim+=t;
    }
    setVoiceHint((finalText+interim)||'...');
  };
  recog.onerror=(e)=>{
    state.listening=false;setMicState('');
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      setVoiceHint('마이크 권한을 허용해주세요');
    }else{setVoiceHint('다시 한 번 눌러 말해주세요');}
  };
  recog.onend=()=>{
    state.listening=false;setMicState('');
    const said=finalText.trim();
    if(said){voiceAsk(said);}
    else{setVoiceHint('마이크를 누르고 말하세요');}
  };
  try{recog.start();}catch(e){setVoiceHint('마이크를 누르고 말하세요');}
}
function stopVoice(){
  if(state.recog){try{state.recog.stop();}catch(e){}state.recog=null;}
  state.listening=false;
  if(window.speechSynthesis){window.speechSynthesis.cancel();}
  state.speaking=false;
  setMicState('');
}
async function voiceAsk(text){
  state.voiceChat.push({role:'user',content:text});
  renderVoice();
  setMicState('thinking');setVoiceHint('비서가 생각하고 있어요...');
  try{
    const res=await fetch(`${SUPABASE_URL}/functions/v1/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json',
        'Authorization':`Bearer ${SUPABASE_KEY}`,'apikey':SUPABASE_KEY},
      body:JSON.stringify({
        system:buildAIContext()+"\n\n[음성 대화 모드: 답변은 듣기 편하게 2~4문장으로 짧고 자연스럽게 말하듯이 해주세요.]",
        messages:state.voiceChat.slice(-10)
      })
    });
    const data=await res.json();
    const raw=data.reply||'죄송해요, 답변을 받지 못했어요.';
    const {clean,log}=extractWorkoutLog(raw);
    state.voiceChat.push({role:'assistant',content:clean,pendingLog:log});
    renderVoice();
    setMicState('');setVoiceHint('마이크를 누르고 말하세요');
    speak(clean);
  }catch(e){
    console.error(e);
    state.voiceChat.push({role:'assistant',content:'연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요.'});
    renderVoice();
    setMicState('');setVoiceHint('마이크를 누르고 말하세요');
  }
}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=1.05;
  u.onstart=()=>{state.speaking=true;};
  u.onend=()=>{state.speaking=false;};
  window.speechSynthesis.speak(u);
}

    const res=await fetch(`${SUPABASE_URL}/functions/v1/chat`,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${SUPABASE_KEY}`,
        'apikey':SUPABASE_KEY
      },
      body:JSON.stringify({
        system:buildAIContext(),
        messages:state.chat.slice(-12) /* 최근 12개만 */
      })
    });
    const data=await res.json();
    const raw=data.reply||'죄송해요, 답변을 받지 못했어요. 잠시 후 다시 시도해주세요.';
    const {clean,log}=extractWorkoutLog(raw);
    state.chat.push({role:'assistant',content:clean,pendingLog:log});
  }catch(e){
    console.error(e);
    state.chat.push({role:'assistant',content:'연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요.'});
  }
  state.aiBusy=false;
  rerenderChat(true);
}

/* 채팅 영역만 다시 그리기 (전체 리렌더 없이) */
function rerenderChat(scroll){
  const panel=document.querySelector('.ai-panel');
  if(!panel)return;
  const msgsBox=document.getElementById('aiMsgs');
  let html=state.chat.map((m,i)=>{
    let h=`<div class="ai-msg ${m.role}">${m.role==='assistant'?'🤖 ':''}${esc(m.content).replace(/\n/g,'<br>')}</div>`;
    if(m.pendingLog)h+=logConfirmCard(m.pendingLog,'text',i);
    return h;
  }).join('');
  if(state.aiBusy)html+=`<div class="ai-msg assistant ai-typing">🤖 <span></span><span></span><span></span></div>`;
  msgsBox.innerHTML=html;
  wireLogCards();
  /* 대화 비우기 버튼 토글 */
  const head=panel.querySelector('.ai-head');
  if(state.chat.length&&!document.getElementById('aiClear')){
    head.insertAdjacentHTML('beforeend','<button class="ai-clear" id="aiClear">대화 비우기</button>');
    document.getElementById('aiClear').onclick=clearChat;
  }
  if(scroll)msgsBox.scrollTop=msgsBox.scrollHeight;
}
function clearChat(){
  if(!confirm('대화 내용을 지울까요?'))return;
  state.chat=[];
  renderAssistant();
}
function wireAIChat(){
  const send=document.getElementById('aiSend');
  const input=document.getElementById('aiInput');
  const clear=document.getElementById('aiClear');
  if(send)send.onclick=sendToAI;
  if(input){
    input.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendToAI();}
    };
    input.oninput=()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';};
  }
  if(clear)clear.onclick=clearChat;
}

/* 종합 등급 — 표준 기준표 기반 (근력 1RM/체중비 + BMI + 유산소) */
function buildGradeCard(){
  const p=state.profile||{};
  const ws=state.workouts||[];
  const bw=p.weight;        /* 체중 */
  const sex=p.sex||'남';    /* 기본 남성 기준 */
  const isM=(sex!=='여');
  const oneRM=w=>w.weight==null?null:w.weight*(1+(w.reps||1)/30);

  /* 데이터 충분한지 — 체중 + (운동 기록 또는 초기 체력값) */
  const hasInit=!!(p.init_bench||p.init_squat||p.init_dead||p.init_run_km||p.init_cycle_kmh);
  const anyWorkout=ws.length>0||hasInit;
  if(!bw||!anyWorkout){
    return `<div class="grade-card locked">
      <div class="gc-emoji">📋</div>
      <div class="gc-locktitle">아직 등급을 매길 수 없어요</div>
      <div class="gc-lockdesc">${!bw?'프로필에 체중을 입력하고, ':''}운동을 기록하거나
        프로필에서 초기 체력을 입력하면 — 전 세계 표준 기준으로 등급을 책정해드려요.</div>
    </div>`;
  }

  /* ---- 1) 근력 점수: 주요 종목 1RM ÷ 체중 비율 ---- */
  /* 표준 strength level 배수 (체중배수, 대략적 기준) */
  /* 종목별 [초보,초급,중급,상급,엘리트] 남성 기준 배수 */
  const STD={
    '벤치프레스':isM?[0.5,0.75,1.0,1.5,2.0]:[0.35,0.5,0.7,1.0,1.4],
    '스쿼트':   isM?[0.75,1.25,1.5,2.0,2.75]:[0.5,0.75,1.25,1.5,2.0],
    '데드리프트':isM?[1.0,1.5,2.0,2.5,3.0]:[0.5,1.0,1.25,1.75,2.5],
    '오버헤드프레스':isM?[0.35,0.55,0.8,1.1,1.4]:[0.2,0.35,0.5,0.75,1.0],
    '바벨로우':isM?[0.5,0.75,1.0,1.4,1.8]:[0.3,0.5,0.7,1.0,1.4],
    '레그프레스':isM?[1.0,1.5,2.5,3.5,5.0]:[0.7,1.2,2.0,2.8,4.0]
  };
  /* 핵심 종목 별칭 — 초보가 다양하게 적어도 잡히도록 (인클라인 벤치→벤치 등) */
  const ALIAS={
    '벤치':'벤치프레스','bench':'벤치프레스','인클라인':'벤치프레스','체스트프레스':'벤치프레스',
    '스쿼트':'스쿼트','squat':'스쿼트','백스쿼트':'스쿼트','프론트스쿼트':'스쿼트','하이바':'스쿼트','로우바':'스쿼트',
    '데드':'데드리프트','데드리프트':'데드리프트','deadlift':'데드리프트','rdl':'데드리프트','루마니안':'데드리프트',
    '오버헤드':'오버헤드프레스','ohp':'오버헤드프레스','숄더프레스':'오버헤드프레스','밀리터리':'오버헤드프레스','어깨프레스':'오버헤드프레스',
    '바벨로우':'바벨로우','벤트오버':'바벨로우','로우':'바벨로우','row':'바벨로우',
    '레그프레스':'레그프레스','legpress':'레그프레스','하체프레스':'레그프레스'
  };
  const levelLabels=['입문','초급','중급','상급','엘리트'];
  /* 맨몸운동: 한 세트 최대 횟수 기준표 [입문,초급,중급,상급,엘리트] */
  const BODY={
    '푸쉬업':isM?[10,20,30,45,70]:[5,12,20,30,50],
    '턱걸이':isM?[1,5,10,15,25]:[1,3,7,12,20],
    '맨몸스쿼트':isM?[20,35,50,75,110]:[15,30,45,65,100],
    '플랭크초':isM?[30,60,120,180,300]:[30,60,120,180,300] /* 초 단위 */
  };
  const BODY_ALIAS={'푸쉬업':'푸쉬업','푸시업':'푸쉬업','팔굽혀':'푸쉬업','pushup':'푸쉬업','push-up':'푸쉬업',
    '턱걸이':'턱걸이','풀업':'턱걸이','pullup':'턱걸이','pull-up':'턱걸이','친업':'턱걸이',
    '맨몸스쿼트':'맨몸스쿼트','맨몸 스쿼트':'맨몸스쿼트','에어스쿼트':'맨몸스쿼트',
    '플랭크':'플랭크초','plank':'플랭크초'};
  /* 종목별 최고 1RM (무게 운동) */
  const bestRM={};
  ws.filter(w=>w.type==='무산소'&&w.weight!=null&&w.exercise).forEach(w=>{
    let key=w.exercise.trim();
    for(const a in ALIAS){if(key.toLowerCase().includes(a.toLowerCase())){key=ALIAS[a];break;}}
    const rm=oneRM(w);
    if(STD[key]&&(bestRM[key]==null||rm>bestRM[key]))bestRM[key]=rm;
  });
  /* 초기 체력값 시드 — 실제 기록이 더 높으면 자동으로 우선됨(max) */
  const seedRM=(key,val)=>{if(val>0&&(bestRM[key]==null||val>bestRM[key]))bestRM[key]=val;};
  seedRM('벤치프레스',p.init_bench);
  seedRM('스쿼트',p.init_squat);
  seedRM('데드리프트',p.init_dead);
  /* 맨몸운동 최고 횟수 (무게 없는 운동) */
  const bestRep={};
  ws.filter(w=>w.type==='무산소'&&w.weight==null&&w.exercise&&(w.reps||w.duration)).forEach(w=>{
    let raw=w.exercise.trim().toLowerCase().replace(/\s/g,'');
    let key=null;
    for(const a in BODY_ALIAS){if(raw.includes(a.toLowerCase().replace(/\s/g,''))){key=BODY_ALIAS[a];break;}}
    if(!key)return;
    /* 플랭크는 시간(초), 나머진 횟수 */
    const val=(key==='플랭크초')?(w.duration?w.duration*60:(w.reps||0)):(w.reps||0);
    if(val>0&&(bestRep[key]==null||val>bestRep[key]))bestRep[key]=val;
  });
  const scoreFromTable=(val,tbl)=>{
    let lv=0;
    for(let i=0;i<tbl.length;i++){if(val>=tbl[i])lv=i;}
    return {sc:Math.min(100,Math.round((val/tbl[4])*100)),lv};
  };
  let strScore=null, strDetail=[], strUnmeasured=false;
  const wKeys=Object.keys(bestRM);
  const bKeys=Object.keys(bestRep);
  if(wKeys.length||bKeys.length){
    let sum=0,cnt=0;
    /* 무게 운동 점수 */
    wKeys.forEach(k=>{
      const ratio=bestRM[k]/bw;
      const std=STD[k];
      let lv=0;
      for(let i=0;i<std.length;i++){if(ratio>=std[i])lv=i;}
      sum+=Math.min(100,Math.round((ratio/std[4])*100));cnt++;
      strDetail.push({k,info:`체중 ${ratio.toFixed(2)}배 · ${levelLabels[lv]}`});
    });
    /* 맨몸운동 점수 (참고용) */
    bKeys.forEach(k=>{
      const {sc,lv}=scoreFromTable(bestRep[k],BODY[k]);
      sum+=sc;cnt++;
      const label=(k==='플랭크초')?'플랭크':k;
      const unit=(k==='플랭크초')?`${bestRep[k]}초`:`${bestRep[k]}회`;
      strDetail.push({k:label,info:`${unit} · ${levelLabels[lv]}`});
    });
    strScore=Math.round(sum/cnt);
  }else{
    /* 근력 데이터 전혀 없으면 미측정 → 0점으로 반영 */
    strScore=0;
    strUnmeasured=true;
  }

  /* ---- 2) 체성분 점수: 인바디 체지방률 우선, 없으면 BMI ---- */
  let bmiScore=null, bmiTxt='', bodyBasis='';
  const ibArr=(state.inbody||[]).slice().sort((a,b)=>a.log_date.localeCompare(b.log_date));
  const latestIb=ibArr.length?ibArr[ibArr.length-1]:null;
  if(latestIb&&latestIb.body_fat!=null){
    /* 체지방률 기준 (남성: 10-20 양호 / 여성: 18-28 양호) */
    const bf=latestIb.body_fat;
    bmiTxt=bf+'%';
    bodyBasis='체지방률';
    if(isM){
      if(bf<=12)bmiScore=100; else if(bf<=16)bmiScore=92; else if(bf<=20)bmiScore=80;
      else if(bf<=25)bmiScore=62; else bmiScore=45;
    }else{
      if(bf<=20)bmiScore=100; else if(bf<=24)bmiScore=92; else if(bf<=28)bmiScore=80;
      else if(bf<=33)bmiScore=62; else bmiScore=45;
    }
  }else if(p.height&&bw){
    const h=p.height/100;
    const bmi=bw/(h*h);
    bmiTxt=bmi.toFixed(1);
    bodyBasis='BMI';
    if(bmi>=18.5&&bmi<23)bmiScore=100;
    else if(bmi>=23&&bmi<25)bmiScore=85;
    else if(bmi>=25&&bmi<28)bmiScore=65;
    else if(bmi>=28)bmiScore=45;
    else bmiScore=70; /* 저체중 */
  }

  /* ---- 3) 유산소 점수: 양(WHO 시간) + 질(속도) 결합 ---- */
  const now=Date.now();
  const weekAe=ws.filter(w=>w.type==='유산소'&&(now-new Date(w.created_at).getTime())<7*86400000);
  const aeMin=weekAe.reduce((s,w)=>s+(w.duration||0),0);
  /* 질(속도) 기준표 — 사이클 평속 [입문,초급,중급,상급,엘리트] km/h */
  const SPD=[18,23,28,33,38];
  /* 러닝 페이스 환산: 러닝은 사이클보다 느리므로 km/h를 약 1.9배로 보정해 동일 잣대 */
  let bestSpeed=0, speedFrom='';
  weekAe.forEach(w=>{
    if(w.distance>0&&w.duration>0){
      const kmh=w.distance/(w.duration/60);
      if(kmh>bestSpeed){bestSpeed=kmh;speedFrom='기록';}
    }
  });
  /* 초기 사이클 평속 */
  if(p.init_cycle_kmh>0&&p.init_cycle_kmh>bestSpeed){bestSpeed=p.init_cycle_kmh;speedFrom='초기값';}
  /* 초기 러닝 기록 → 사이클 환산 속도로 비교 */
  if(p.init_run_km>0&&p.init_run_min>0){
    const runKmh=p.init_run_km/(p.init_run_min/60);
    const eqv=runKmh*1.9; /* 러닝→사이클 난이도 환산 */
    if(eqv>bestSpeed){bestSpeed=eqv;speedFrom='초기값(러닝)';}
  }
  let aeScore=null, aeSpeedTxt='';
  let qualScore=null;
  if(bestSpeed>0){
    let lv=0;for(let i=0;i<SPD.length;i++){if(bestSpeed>=SPD[i])lv=i;}
    qualScore=Math.min(100,Math.round((bestSpeed/SPD[4])*100));
    aeSpeedTxt=`${levelLabels[lv]}`;
  }
  if(weekAe.length){
    const volScore=Math.min(100,Math.round((aeMin/150)*100));
    aeScore=(qualScore!=null)?Math.round(volScore*0.5+qualScore*0.5):volScore;
  }else if(qualScore!=null){
    /* 주간 기록은 없지만 초기 능력치가 있으면 질 점수로 (양 데이터 부족 감안 약간 감점) */
    aeScore=Math.round(qualScore*0.85);
  }

  /* ---- 3-b) 하이록스(HYROX) — 완주 시간 기반 별도 평가 ---- */
  /* 종목명에 하이록스/HYROX/록스가 들어간 기록의 완주 시간(분)으로 레벨 산정 */
  let hyroxTxt='', hyroxScore=null;
  const hyroxLogs=ws.filter(w=>{
    const n=(w.exercise||'').toLowerCase().replace(/\s/g,'');
    return n.includes('하이록스')||n.includes('hyrox')||n.includes('록스');
  }).filter(w=>w.duration>0);
  if(hyroxLogs.length){
    /* 가장 빠른(작은) 완주 시간 */
    const best=Math.min(...hyroxLogs.map(w=>w.duration));
    /* 오픈 디비전 완주시간 기준표(분): 빠를수록 상급 [입문,초급,중급,상급,엘리트] */
    /* 약 60분=엘리트, 75=상급, 90=중급, 105=초급, 120+=입문 (성별 보정) */
    const HX=isM?[120,105,90,75,60]:[135,120,105,90,75];
    let lv=0;for(let i=0;i<HX.length;i++){if(best<=HX[i])lv=i;}
    hyroxScore=Math.min(100,Math.round((HX[0]/best)*60)); /* 빠를수록 높음 */
    hyroxScore=Math.max(20,Math.min(100,hyroxScore));
    const hh=Math.floor(best/60), mm=Math.round(best%60);
    const tstr=hh>0?`${hh}시간 ${mm}분`:`${mm}분`;
    hyroxTxt=`완주 ${tstr} · ${levelLabels[lv]}`;
    /* 하이록스 점수는 유산소 점수에 합산 반영 (둘 중 높은 쪽 70% + 낮은 쪽 30%) */
    if(aeScore==null){aeScore=hyroxScore;}
    else{const hi=Math.max(aeScore,hyroxScore),lo=Math.min(aeScore,hyroxScore);aeScore=Math.round(hi*0.7+lo*0.3);}
  }

  /* ---- 4) 운동량(볼륨) 계수 — 맛보기 수준이면 점수 감쇄 ---- */
  /* 이번 주 무산소 총 세트 + 유산소 시간(분)을 합산해 '주간 활동량' 추정 */
  const weekWs=ws.filter(w=>(now-new Date(w.created_at).getTime())<7*86400000);
  const weekSets=weekWs.filter(w=>w.type==='무산소').reduce((s,w)=>s+(w.sets||1),0);
  const weekAeMin=weekWs.filter(w=>w.type==='유산소').reduce((s,w)=>s+(w.duration||0),0);
  /* 활동 점수: 무산소 1세트=1점, 유산소 10분=1점 (대략) */
  const activity=weekSets+(weekAeMin/10);
  /* 권장 주간 활동량(약 30점 기준=충분)에 비례한 계수 0.5~1.0 */
  const volFactor=Math.max(0.5,Math.min(1,activity/30));

  /* ---- 종합 ---- */
  const parts=[strScore,bmiScore,aeScore].filter(v=>v!=null);
  const base=parts.reduce((a,b)=>a+b,0)/parts.length;
  const total=Math.round(base*volFactor);
  /* 점수 → 등급 변환 헬퍼 */
  const toGrade=(sc)=>
    sc==null?{g:'–',label:'미측정',cls:'gd'}:
    sc>=90?{g:'S',label:'엘리트',cls:'gs'}:
    sc>=75?{g:'A',label:'상급',cls:'ga'}:
    sc>=60?{g:'B',label:'중급',cls:'gb'}:
    sc>=40?{g:'C',label:'초급',cls:'gc'}:
           {g:'D',label:'입문',cls:'gd'};
  const grade=toGrade(total);
  /* 부문별 등급 */
  const gStr=strUnmeasured?toGrade(null):toGrade(strScore);
  const gAe=toGrade(aeScore);
  const gBody=toGrade(bmiScore);

  const strList=strDetail.map(s=>
    `<div class="gc-row"><span>${esc(s.k)}</span>
     <span><b>${esc(s.info)}</b></span></div>`).join('');
  const strHint=strUnmeasured?
    `<div class="gc-row"><span>근력</span><span>벤치·스쿼트·데드 기록 시 반영</span></div>`:'';
  const volHint=(volFactor<1)?
    `<div class="gc-row"><span>운동량</span><span>아직 적어요 (점수 ${Math.round(volFactor*100)}% 반영)</span></div>`:'';
  const aeHint=aeSpeedTxt?
    `<div class="gc-row"><span>유산소 강도</span><span><b>${aeSpeedTxt}</b></span></div>`:'';
  const hyroxHint=hyroxTxt?
    `<div class="gc-row"><span>🔥 하이록스</span><span><b>${hyroxTxt}</b></span></div>`:'';

  /* 부문 등급 3칸 */
  const subGrade=(emoji,name,g,sc)=>`
    <div class="gc-sub-item ${g.cls}">
      <div class="gc-sub-badge">${g.g}</div>
      <div class="gc-sub-name">${emoji} ${name}</div>
      <div class="gc-sub-score">${sc==null?'미측정':sc+'점'}</div>
    </div>`;

  /* 운동량 감점 설명 — 종합이 부문 평균보다 낮은 이유 */
  const baseRounded=Math.round(base);
  const volExplain=(volFactor<1)?`
    <div class="gc-vol-note">
      <b>왜 종합이 더 낮나요?</b> 능력치 평균은 ${baseRounded}점이지만,
      최근 운동 기록이 적어 ${Math.round(volFactor*100)}%만 반영했어요
      (${baseRounded} × ${volFactor.toFixed(2)} = ${total}점).
      이번 주 운동을 기록하면 종합 등급이 능력치에 가깝게 올라갑니다.
    </div>`:'';

  return `<div class="grade-card ${grade.cls}">
    <div class="gc-top">
      <div class="gc-badge">${grade.g}</div>
      <div class="gc-meta">
        <div class="gc-title">종합 등급 · ${grade.label}</div>
        <div class="gc-score">${total}<span>/100</span></div>
      </div>
    </div>
    <div class="gc-subs">
      ${subGrade('💪','무산소',gStr,strUnmeasured?null:strScore)}
      ${subGrade('🏃','유산소',gAe,aeScore)}
      ${subGrade('🧬','체성분',gBody,bmiScore)}
    </div>
    ${volExplain}
    <div class="gc-detail">${strList}${strHint}${bmiTxt?`<div class="gc-row"><span>${bodyBasis||'BMI'}</span><span>${bmiTxt}</span></div>`:''}${aeHint}${hyroxHint}${volHint}</div>
    <div class="gc-note">무산소·유산소·체성분을 전 세계 표준 기준표로 각각 평가하고,
      평균으로 종합 등급을 냅니다. 참고용이며, 기록이 쌓일수록 정확해져요.</div>
  </div>`;
}

/* 근력 추이 카드 — 종목별 추정 1RM 변화 */
function buildStrengthCard(){
  const oneRM=w=>w.weight==null?null:w.weight*(1+(w.reps||1)/30);
  const ws=(state.workouts||[]).filter(w=>w.type==='무산소'&&w.weight!=null&&w.exercise);
  if(!ws.length)return '';
  const byEx={};
  ws.forEach(w=>{(byEx[w.exercise.trim()]=byEx[w.exercise.trim()]||[]).push(w);});
  const rows=[];
  for(const ex in byEx){
    const arr=byEx[ex].slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const firstRM=oneRM(arr[0]);
    const lastRM=oneRM(arr[arr.length-1]);
    const cur=Math.round(lastRM);
    let badge='';
    if(arr.length>=2&&firstRM>0){
      const pct=Math.round(((lastRM-firstRM)/firstRM)*100);
      if(pct>0)badge=`<span class="str-up">+${pct}% ▲</span>`;
      else if(pct<0)badge=`<span class="str-down">${pct}% ▼</span>`;
      else badge=`<span class="str-flat">유지</span>`;
    }else{
      badge=`<span class="str-flat">기록 1회</span>`;
    }
    rows.push({ex,cur,badge,count:arr.length});
  }
  /* 추정 1RM 높은 순 */
  rows.sort((a,b)=>b.cur-a.cur);
  return `
    <div class="wk-list-head">💪 근력 추이 <span style="font-weight:600;color:var(--muted)">· 추정 1RM</span></div>
    <div class="str-list">`+rows.map(r=>`
      <div class="str-item">
        <span class="str-ex">${esc(r.ex)}</span>
        <span class="str-val">${r.cur}kg ${r.badge}</span>
      </div>`).join('')+`</div>
    <div class="str-note">* 1RM은 무게·횟수로 추정한 값이에요 (실제 최대중량과 다를 수 있어요)</div>`;
}
